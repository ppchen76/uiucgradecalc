<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grade Calculator</title>
    <style>
        :root { --primary: #2da44e; --bg: #f6f8fa; --text: #24292f; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; border: 1px solid #d0d7de; border-radius: 8px; padding: 24px; width: 100%; max-width: 450px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-top: 0; color: #1b1f23; }
        p.note { font-size: 12px; color: #57606a; text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: span 2; }
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #24292f; }
        input { width: 100%; padding: 10px; border: 1px solid #d0d7de; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; background-color: var(--primary); color: white; border: none; border-radius: 6px; padding: 14px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #2c974b; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; text-align: center; border: 1px solid transparent; }
        .success { background-color: #dafbe1; border-color: #4ac26b; }
        .warning { background-color: #fff8c5; border-color: #d4a72c; }
        hr { border: 0; border-top: 1px solid #d0d7de; margin: 20px 0; }
        .mid-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Grade Calculator</h2>
    <p class="note">Final (18%) replaces lowest Midterm (16%) ONLY if Final is higher.</p>
    
    <div class="grid">
        <div><label>Syl. Quiz (2%)</label><input type="number" id="sylQuiz"></div>
        <div><label>Attendance (3%)</label><input type="number" id="attend"></div>
        <div><label>Lab Att. (10%)</label><input type="number" id="labAtt"></div>
        <div><label>Nonlab HW (8%)</label><input type="number" id="nlHW"></div>
        <div><label>Lab HW (5%)</label><input type="number" id="labHW"></div>
        <div><label>Py Quizzes (6%)</label><input type="number" id="pyQuiz"></div>
        
        <div class="full"><hr></div>
        
        <div class="full">
            <label>Midterm Scores (16% each)</label>
            <div class="mid-grid">
                <input type="number" id="m1" placeholder="M1">
                <input type="number" id="m2" placeholder="M2">
                <input type="number" id="m3" placeholder="M3">
            </div>
        </div>

        <div class="full">
            <label>Target Class Grade (%)</label>
            <input type="number" id="target" placeholder="e.g. 90">
        </div>
    </div>

    <button onclick="calculate()">Calculate Required Score</button>
    <div id="result"></div>
</div>

<script>
    function calculate() {
        const sQ = parseFloat(document.getElementById('sylQuiz').value) || 0;
        const att = parseFloat(document.getElementById('attend').value) || 0;
        const lA = parseFloat(document.getElementById('labAtt').value) || 0;
        const nHW = parseFloat(document.getElementById('nlHW').value) || 0;
        const lHW = parseFloat(document.getElementById('labHW').value) || 0;
        const pQ = parseFloat(document.getElementById('pyQuiz').value) || 0;
        const m1 = parseFloat(document.getElementById('m1').value) || 0;
        const m2 = parseFloat(document.getElementById('m2').value) || 0;
        const m3 = parseFloat(document.getElementById('m3').value) || 0;
        const target = parseFloat(document.getElementById('target').value);

        if (isNaN(target)) { alert("Enter target grade"); return; }

        const wFixed = (sQ * 0.02) + (att * 0.03) + (lA * 0.10) + (nHW * 0.08) + (lHW * 0.05) + (pQ * 0.06);
        const midterms = [m1, m2, m3].sort((a, b) => a - b); // [lowest, mid, high]
        
        // Scenario 1: Final is HIGHER than lowest midterm (Replacement happens)
        // Target = wFixed + (M_mid * 0.16) + (M_high * 0.16) + [Final * (0.18 + 0.16)]
        const neededWithReplace = (target - wFixed - (midterms[1] * 0.16) - (midterms[2] * 0.16)) / 0.34;

        // Scenario 2: Final is LOWER than lowest midterm (No replacement)
        // Target = wFixed + (M1 * 0.16) + (M2 * 0.16) + (M3 * 0.16) + (Final * 0.18)
        const neededNoReplace = (target - wFixed - (m1 * 0.16) - (m2 * 0.16) - (m3 * 0.16)) / 0.18;

        // The logic: If you need a replacement to hit the target, use that number.
        // If your midterms are already so high that the final doesn't NEED to replace one, 
        // the required score will be lower.
        let finalScoreNeeded;
        if (neededWithReplace <= midterms[0]) {
            // If the score you need is actually lower than your lowest midterm, 
            // then replacement doesn't trigger/isn't needed.
            finalScoreNeeded = neededNoReplace;
        } else {
            finalScoreNeeded = neededWithReplace;
        }

        const res = document.getElementById('result');
        res.style.display = 'block';
        res.className = finalScoreNeeded > 100 ? 'warning' : 'success';
        
        if (finalScoreNeeded <= 0) {
            res.innerHTML = "🎉 You've hit your goal! You can get a 0% on the final.";
        } else {
            const replaceText = finalScoreNeeded > midterms[0] ? 
                `<br><small>(This replaces your ${midterms[0]}% midterm)</small>` : 
                `<br><small>(Final is lower than midterms; no replacement triggered)</small>`;
            res.innerHTML = `Required Final Score: <strong>${finalScoreNeeded.toFixed(2)}%</strong> ${replaceText}`;
        }
    }
</script>

</body>
</html>
