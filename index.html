<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Goal Calculator</title>
    <style>
        :root { --primary: #2da44e; --bg: #f6f8fa; --text: #24292f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; border: 1px solid #d0d7de; border-radius: 6px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(140,149,159,0.2); }
        h1 { font-size: 20px; margin-bottom: 8px; text-align: center; }
        p.subtitle { font-size: 12px; color: #57606a; text-align: center; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-top: 16px; font-size: 14px; }
        input { width: 100%; padding: 8px 12px; margin-top: 4px; border: 1px solid #d0d7de; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .midterms { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        button { width: 100%; background-color: var(--primary); color: white; border: 1px solid rgba(27,31,36,0.15); border-radius: 6px; padding: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 24px; }
        button:hover { background-color: #2c974b; }
        #result { margin-top: 20px; padding: 16px; border-radius: 6px; display: none; text-align: center; font-weight: 500; border: 1px solid transparent; }
        .success { background-color: #dafbe1; border-color: #4ac26b; }
        .warning { background-color: #fff8c5; border-color: #d4a72c; }
    </style>
</head>
<body>

<div class="container">
    <h1>Grade Calculator</h1>
    <p class="subtitle">Final replaces your lowest midterm score</p>
    
    <label>Midterm Scores (%)</label>
    <div class="midterms">
        <input type="number" id="m1" placeholder="M1">
        <input type="number" id="m2" placeholder="M2">
        <input type="number" id="m3" placeholder="M3">
    </div>

    <label>Other Grades (HW/Quizzes %)</label>
    <input type="number" id="other" placeholder="e.g. 95">

    <label>Target Class Grade (%)</label>
    <input type="number" id="target" placeholder="e.g. 90">

    <label>Weight of Final Exam (%)</label>
    <input type="number" id="wFinal" placeholder="e.g. 25">

    <label>Weight of Each Midterm (%)</label>
    <input type="number" id="wMid" placeholder="e.g. 15">

    <button onclick="calculate()">Calculate Required Score</button>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        const m1 = parseFloat(document.getElementById('m1').value) || 0;
        const m2 = parseFloat(document.getElementById('m2').value) || 0;
        const m3 = parseFloat(document.getElementById('m3').value) || 0;
        const other = parseFloat(document.getElementById('other').value) || 0;
        const target = parseFloat(document.getElementById('target').value);
        const wFinal = parseFloat(document.getElementById('wFinal').value) / 100;
        const wMid = parseFloat(document.getElementById('wMid').value) / 100;

        const midterms = [m1, m2, m3];
        const lowestMid = Math.min(...midterms);
        const remainingMidsSum = midterms.reduce((a, b) => a + b, 0) - lowestMid;
        
        // Calculate weight of "other" category automatically
        const wOther = 1 - (wMid * 3) - wFinal;
        
        // Math: Target = (Other*wOther) + (RemainingMids*wMid) + [Final*(wFinal + wMid)]
        const knownPoints = (other * wOther) + (remainingMidsSum * wMid);
        const needed = (target - knownPoints) / (wFinal + wMid);

        const res = document.getElementById('result');
        res.style.display = 'block';
        res.className = needed > 100 ? 'warning' : 'success';
        
        if (needed <= 0) {
            res.innerHTML = "You're all set! You could get a 0% and still hit your goal.";
        } else {
            res.innerHTML = `To get a ${target}%, you need a <strong>${needed.toFixed(2)}%</strong> on the final. <br><small>(This replaces your ${lowestMid}% midterm)</small>`;
        }
    }
</script>

</body>
</html>
